server:
  port: 20000

spring:
  application:
    name: e-commerce-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true  #开启 Flag that enables DiscoveryClient gateway integration,即启用DiscoveryClient 服务发现
      routes: #配置路由, 可以有多个路由配置
        - id: member_routh01 #路由的 ID，程序员自己写,要求唯一

          #gateway 最终访问的 url = uri+Path 即: http://localhost:10000/memeber/get/
          #匹配后提供服务的路由地址, 也可以是外网 uri,比如 http://www.qq.com 等
          #uri: http://localhost:10000
          #说明: lb 是协议名 member-service-provider 是服务名
          uri: lb://member-service-provider
          filters:
            - AddRequestParameter=color, blue #过滤器工厂会在匹配的请求头加上一对请求头，名称为 color 值为 blue
            - AddRequestParameter=age, 18 #过滤器工厂会在匹配的请求头加上一对请求头，名称为 age 值为 18
          predicates:
            - Path=/member/get/** #断言,路径相匹配的进行路由
            #- Between=2020-11-18T12:35:50.387+08:00[Asia/Shanghai],2022-11-18T12:35:50.387+08:00[Asia/Shanghai] #断言,在这个时间段内的进行路由
            #- Before=2022-11-18T12:35:50.387+08:00[Asia/Shanghai] #断言,在这个时间之前的进行路由
            #- After=2022-11-18T12:35:50.387+08:00[Asia/Shanghai] #断言,在这个时间之后的进行路由
        - id: member_routh02 #另外一组路由
          #uri: http://localhost:10000
          uri: lb://member-service-provider
          predicates:
            - Path=/member/save

#eureka 客户端配置
eureka:
  instance:
    hostname: e-commerce-service
  client:
    service-url:
      #表示关联哪个 eurekaServer(注册/拉取服务信息)
      #使用 eureka server 单机环境测试
      defaultZone: http://eureka9001.com:9001/eureka
