server:
  port: 20000

spring:
  application:
    name: e-commerce-gateway
  cloud:
    gateway:
      routes: #配置路由, 可以有多个路由配置
        - id: member_routh01 #路由的 ID，程序员自己写,要求唯一

          #gateway 最终访问的 url = uri+Path 即: http://localhost:10000/memeber/get/
          #匹配后提供服务的路由地址, 也可以是外网 uri,比如 http://www.qq.com 等
          uri: http://localhost:10000
          predicates:
            - Path=/member/get/** #断言,路径相匹配的进行路由
        - id: member_routh02 #另外一组路由
          uri: http://localhost:10000
          predicates:
            - Path=/member/save

#eureka 客户端配置
eureka:
  instance:
    hostname: e-commerce-service
  client:
    service-url:
      #表示关联哪个 eurekaServer(注册/拉取服务信息)
      #使用 eureka server 单机环境测试
      defaultZone: http://eureka9001.com:9001/eureka
