server:
  port: 9001

eureka:
  instance:
    hostname: eureka9001.com #eureka 服务端的实例名字
  client:
    register-with-eureka: false #不向注册中心注册自己
    #表示自己就是注册中心，职责是维护服务实例，并不需要去检索服务
    fetch-registry: false
    service-url:
      #设置与 eureka server 交互的模块,查询服务和注册服务都需要依赖这个地址
      defaultZone: http://eureka9002.com:9002/eureka/ # 相互注册
    server:
      #enable-self-preservation: false #关闭自我保护机制，保证不可用服务被及时踢除
      #eviction-interval-timer-in-ms: 2000 #间隔时间2s,即2秒收不到心跳就认为超时