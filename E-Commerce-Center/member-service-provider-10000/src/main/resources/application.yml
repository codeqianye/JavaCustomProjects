server:
  port: 10000

spring:
  application:
    name: member-service-provider #名称，可以自己指定
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/e_commerce_center_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&nullCatalogMeansCurrent=true
    username: root
    password: 123456
mybatis:
  mapperLocations: classpath:mapper/*.xml #后面 mapper 文件的位置
  type-aliases-package: com.feng.springcloud.entity # 实体类的包路径

#eureka 客户端配置
eureka:
  client:
    register-with-eureka: true #将自己注册到 EurekaServer
    #是否从从 EurekaServer 抓取注册信息，默认为 true, 单节点无所谓，
    #集群必须设置为 true 才能配合 ribbon 使用负载均衡
    fetchRegistry: true
    service-url:
      #将本微服务注册到多个 eurekaServer, 使用逗号隔开
      defaultZone: http://eureka9001.com:9001/eureka,http://eureka9002.com:9002/eureka
    #心断检与续约时间
    #如果你希望保证CP，时间间隔可以短一些，保证服务关闭后注册中心能即使剔除服务instance
    #Eureka客户端向服务端发送心跳的时间间隔，单位为秒（默认是30秒）
    #lease-renewal-interval-in-seconds: 1
    #Eureka服务端在收到最后一次心跳后等待时间上限，单位为秒（默认是90秒），超时将剔除服务
    #lease-expiration-duration-in-seconds: 2